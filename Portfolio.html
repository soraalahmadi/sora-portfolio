<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sora Alahmadi — Business Development & Product</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500&family=IBM+Plex+Sans+Arabic:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="colors_and_type.css">
<meta name="ext-resource-dependency" content="assets/Sora-Alahmadi-CV.pdf" data-resource-id="cv" />
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: #fff; }
  body { overflow-x: hidden; }

  @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
  @keyframes pulse {
    0% { box-shadow: 0 0 0 0 rgba(184,134,11, 0.55); }
    70% { box-shadow: 0 0 0 8px rgba(184,134,11, 0); }
    100% { box-shadow: 0 0 0 0 rgba(184,134,11, 0); }
  }

  /* hover effects */
  .impact-card:hover { background: #f4f3f0 !important; border-color: #e0ded8 !important; transform: translateY(-3px); box-shadow: 0 18px 40px -22px rgba(0,0,0,0.22); }
  .impact-card { transition: background 260ms ease, border-color 260ms ease, transform 260ms ease, box-shadow 260ms ease; }
  .contact-link:hover { background: #fafafa; border-color: #d4d4d4 !important; }
  .detail-back:hover { background: #f0efeb; border-color: #ddd !important; }
  .stat-card:hover { background: #f4f3f0 !important; border-color: #e0ded8 !important; transform: translateY(-3px); box-shadow: 0 18px 40px -22px rgba(0,0,0,0.22); }
  .rec-card:hover { transform: translateY(-4px); border-color: #333 !important; box-shadow: 0 26px 54px -30px rgba(0,0,0,0.9); }

  a { transition: color 120ms linear; }

  /* density tweak */
  [data-density="compact"] section { padding-top: 80px !important; padding-bottom: 80px !important; }
  [data-cursor="off"] h1 span[style*="blink"] { display: none !important; }

  /* Responsive */
  @media (max-width: 960px) {
    .nav-desktop { display: none !important; }
    .nav-mobile-btn { display: inline-flex !important; }
    .num-grid { grid-template-columns: repeat(2, 1fr) !important; }
    .impact-grid { grid-template-columns: repeat(2, 1fr) !important; }
    .impact-title { min-height: 0 !important; }
    .impact-lead { min-height: 0 !important; }
    .bring-grid { grid-template-columns: 1fr !important; gap: 24px !important; }    .rec-grid { grid-template-columns: 1fr 1fr !important; }
    .projects-grid { grid-template-columns: 1fr !important; }
    .detail-row { grid-template-columns: 1fr !important; gap: 12px !important; }
    .contact-grid { grid-template-columns: 1fr !important; gap: 48px !important; }
  }
  @media (max-width: 600px) {
    .num-grid { grid-template-columns: 1fr !important; }
    .impact-grid { grid-template-columns: 1fr !important; }
    .stats-grid { grid-template-columns: 1fr !important; grid-auto-rows: auto !important; }
    .rec-grid { grid-template-columns: 1fr !important; }
    .rec-card { height: auto !important; min-height: 0 !important; }
    .detail-wrap { padding-left: 20px !important; padding-right: 20px !important; }
    .detail-topbar { padding-left: 20px !important; padding-right: 20px !important; }
    .detail-visual { min-height: 300px !important; height: auto !important; margin-top: 28px !important; }
    .detail-h1 { font-size: 25px !important; line-height: 1.18 !important; }
  }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="primitives.jsx"></script>
<script type="text/babel" src="sections-a.jsx"></script>
<script type="text/babel" src="sections-b.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "showCursor": true,
  "goldAccent": true,
  "density": "roomy"
}/*EDITMODE-END*/;

function App() {
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);

  // Apply gold accent toggle via CSS var
  React.useEffect(() => {
    document.documentElement.style.setProperty("--gold", tweaks.goldAccent ? "#b8860b" : "#262626");
    document.documentElement.setAttribute("data-density", tweaks.density);
    document.documentElement.setAttribute("data-cursor", tweaks.showCursor ? "on" : "off");
  }, [tweaks.goldAccent, tweaks.density, tweaks.showCursor]);

  return (
    <div style={{ background: "#fff" }}>
      <Nav />
      <main>
        <Hero />
        <WhatIBring />
        <Impact />
        <Projects />
        <Recommendations />
        <Contact />
      </main>
      <Footer />

      <TweaksPanel title="Tweaks">
        <TweakSection label="Hero" />
        <TweakToggle label="Show typing cursor" value={tweaks.showCursor} onChange={(v) => setTweak('showCursor', v)} />
        <TweakSection label="Color" />
        <TweakToggle label="Gold accent on" value={tweaks.goldAccent} onChange={(v) => setTweak('goldAccent', v)} />
        <TweakSection label="Layout" />
        <TweakRadio label="Density" value={tweaks.density} options={[
          {label:'Compact', value:'compact'},
          {label:'Roomy', value:'roomy'}
        ]} onChange={(v) => setTweak('density', v)} />
      </TweaksPanel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
<template id="__bundler_thumbnail" data-bg-color="#000000">
  <svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
    <rect width="1200" height="800" fill="#000000"/>
    <text x="220" y="430" font-family="IBM Plex Sans, sans-serif" font-size="150" font-weight="500" fill="#ffffff" letter-spacing="-4">sora<tspan fill="#b8860b">.</tspan></text>
  </svg>
</template>
</body>
</html>
